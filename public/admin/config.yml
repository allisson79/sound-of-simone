backend:
  name: github
  repo: allisson79/sound-of-simone
  branch: dev
  base_url: https://decap.soundofsimone.no
  auth_endpoint: /auth

publish_mode: simple

site_url: https://dev.sound-of-simone-dev.pages.dev/preview
display_url: https://dev.sound-of-simone-dev.pages.dev/preview

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "simone_text"
    label: "Tekstinnhold"
    files:
      - label: "Forside og Om Simone"
        name: "home_copy"
        file: "src/data/editor/home-copy.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "kicker", widget: "string", required: false }
              - { label: "Tittel", name: "title", widget: "string" }
              - { label: "Ingress", name: "lead", widget: "text" }
              - { label: "Primarknapp", name: "primaryCtaLabel", widget: "string" }

          - label: "Proof-stripe"
            name: "proofItems"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Verdi", name: "value", widget: "text" }

          - label: "Om Simone"
            name: "aboutSimone"
            widget: "object"
            fields:
              - { label: "Seksjonstittel", name: "title", widget: "string" }
              - { label: "Navn", name: "name", widget: "string" }
              - { label: "Ingress", name: "ingress", widget: "text" }
              - label: "Roller"
                name: "roles"
                widget: "list"
                field: { label: "Rolle", name: "role", widget: "string" }
              - label: "Min reise"
                name: "journey"
                widget: "list"
                field: { label: "Avsnitt", name: "paragraph", widget: "text" }
              - label: "Utdanning"
                name: "education"
                widget: "list"
                field: { label: "Punkt", name: "item", widget: "string" }
              - label: "Kurs"
                name: "courses"
                widget: "list"
                field: { label: "Punkt", name: "item", widget: "string" }

          - label: "Avsluttende CTA"
            name: "ctaBand"
            widget: "object"
            fields:
              - { label: "Tittel", name: "title", widget: "string" }
              - { label: "Knappetekst", name: "primaryLabel", widget: "string" }

      - label: "Tjenester"
        name: "services_copy"
        file: "src/data/editor/services-copy.json"
        format: "json"
        fields:
          - label: "Tjenesteoversikt"
            name: "overview"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Tittel", name: "title", widget: "string" }
              - { label: "Ingress", name: "lead", widget: "text" }
              - { label: "Primarknapp", name: "primaryActionLabel", widget: "string" }

          - label: "Sound of Physio"
            name: "physio"
            widget: "object"
            fields:
              - { label: "Tittel", name: "title", widget: "string" }
              - { label: "Kort tekst", name: "lead", widget: "text" }
              - label: "Temaer"
                name: "moreTopics"
                widget: "list"
                field: { label: "Tema", name: "topic", widget: "string" }
              - { label: "Detaljside ingress", name: "detailLead", widget: "text" }
              - { label: "Detaljside seksjonstittel", name: "detailTitle", widget: "string" }
              - { label: "Stotte-eyebrow", name: "supportEyebrow", widget: "string" }
              - { label: "Stottetekst", name: "supportBody", widget: "text" }
              - { label: "Primarknapp", name: "primaryActionLabel", widget: "string" }

          - label: "Sound of Women"
            name: "women"
            widget: "object"
            fields:
              - { label: "Tittel", name: "title", widget: "string" }
              - { label: "Kort tekst", name: "lead", widget: "text" }
              - label: "Blokker"
                name: "blocks"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Tittel", name: "title", widget: "string" }
                  - { label: "Tekst", name: "body", widget: "text" }
                  - { label: "Knappeetikett", name: "ctaLabel", widget: "string" }
              - { label: "Detaljside ingress", name: "detailLead", widget: "text" }
              - { label: "Detaljside seksjonstittel", name: "detailTitle", widget: "string" }
              - { label: "Stotte-eyebrow", name: "supportEyebrow", widget: "string" }
              - { label: "Stottetekst", name: "supportBody", widget: "text" }
              - { label: "Primarknapp", name: "primaryActionLabel", widget: "string" }

          - label: "Sound of Waves"
            name: "waves"
            widget: "object"
            fields:
              - { label: "Tittel", name: "title", widget: "string" }
              - { label: "Kort tekst", name: "lead", widget: "text" }
              - { label: "Statusetikett", name: "launchLabel", widget: "string" }
              - { label: "Detaljside ingress", name: "detailLead", widget: "text" }
              - { label: "Detaljside seksjonstittel", name: "detailTitle", widget: "string" }
              - { label: "Stotte-eyebrow", name: "supportEyebrow", widget: "string" }
              - { label: "Stottetekst", name: "supportBody", widget: "text" }
              - { label: "Primarknapp", name: "primaryActionLabel", widget: "string" }

      - label: "Bestill time"
        name: "booking_copy"
        file: "src/data/editor/booking-copy.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Tittel", name: "title", widget: "string" }
              - { label: "Ingress", name: "lead", widget: "text" }
              - { label: "Primarknapp", name: "primaryActionLabel", widget: "string" }

          - label: "Innhold"
            name: "content"
            widget: "object"
            fields:
              - { label: "Seksjonstittel", name: "sectionTitle", widget: "string" }
              - { label: "Forklaring", name: "lead", widget: "text" }
              - { label: "Statusetikett", name: "statusLabel", widget: "string" }
              - { label: "Neste steg-eyebrow", name: "nextStepEyebrow", widget: "string" }
              - { label: "Neste steg-tekst", name: "nextStepBody", widget: "text" }

      - label: "Kontakt"
        name: "contact_copy"
        file: "src/data/editor/contact-copy.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Tittel", name: "title", widget: "string" }
              - { label: "Ingress", name: "lead", widget: "text" }
              - { label: "Primarknapp", name: "primaryActionLabel", widget: "string" }

          - label: "Innhold"
            name: "content"
            widget: "object"
            fields:
              - { label: "Tittel for direkte kontakt", name: "directTitle", widget: "string" }
              - { label: "Stotte-eyebrow", name: "supportEyebrow", widget: "string" }
              - { label: "Stottetekst", name: "supportBody", widget: "text" }

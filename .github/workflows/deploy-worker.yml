name: Deploy OAuth Proxy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'decap-proxy/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy OAuth Proxy Worker
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'decap-proxy/package-lock.json'

      - name: Install dependencies
        working-directory: ./decap-proxy
        run: npm ci

      - name: Validate Cloudflare token/account access
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing required secrets: CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

          token_verify="$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "https://api.cloudflare.com/client/v4/user/tokens/verify")"
          if ! echo "${token_verify}" | grep -q '"success":true'; then
            echo "::error::Cloudflare token verification failed. Create an Account API token for the target account."
            echo "${token_verify}"
            exit 1
          fi

          account_probe="/tmp/cf-workers-probe.json"
          http_code="$(curl -sS -o "${account_probe}" -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts")"

          if [ "${http_code}" -ge 400 ] || ! grep -q '"success":true' "${account_probe}"; then
            echo "::error::Token/account access check failed for account ${CLOUDFLARE_ACCOUNT_ID}."
            cat "${account_probe}"
            echo "::error::Ensure token has at least Account -> Workers Scripts:Edit (and Workers Routes:Edit when using worker custom domains)."
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        working-directory: ./decap-proxy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
